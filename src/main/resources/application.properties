spring.application.name=reservAMF

spring.datasource.url=jdbc:postgresql://localhost:5432/reservamf
spring.datasource.username=postgres
spring.datasource.password=senha_local_segura_falsa

# JPA
spring.jpa.hibernate.ddl-auto=validate

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true


# Config para ver se o problema do N+1 foi corrigido
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Redis
spring.cache.type=redis
spring.cache.redis.time-to-live=10s